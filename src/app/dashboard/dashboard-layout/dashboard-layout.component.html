<main-container-theme>

  <!-- Sidebar -->
  <sidebar-theme [isCollapsed]="isCollapsed">

    <!-- Header del sidebar -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 dark:border-gray-700">
      <brand-theme *ngIf="!isCollapsed"></brand-theme>
      <toggle-button-theme [isCollapsed]="isCollapsed" (toggle)="toggleSidebar()"></toggle-button-theme>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2">
      <nav-item-theme
        *ngFor="let item of navigationItems"
        [route]="item.route"
        [active]="item.active"
        [showLabel]="!isCollapsed"
        (itemClick)="setActiveRoute(item.route)">

        <!-- home -->
        <svg slot="icon" *ngIf="item.icon === 'home'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <!-- building -->
        <svg slot="icon" *ngIf="item.icon === 'building'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1" />
        </svg>
        <!-- briefcase (Servicios) -->
        <svg slot="icon" *ngIf="item.icon === 'briefcase'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <!-- users (Profesionales) -->
        <svg slot="icon" *ngIf="item.icon === 'users'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- question (FAQs) -->
        <svg slot="icon" *ngIf="item.icon === 'question'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <!-- calendar (Citas) -->
        <svg slot="icon" *ngIf="item.icon === 'calendar'" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>

        {{ item.label }}
      </nav-item-theme>
    </nav>

      <solercia-credit-theme [isCollapsed]="isCollapsed"></solercia-credit-theme>
  </sidebar-theme>

  <!-- Main content area -->
  <div class="flex-1 flex flex-col transition-all duration-300" [class.ml-72]="!isCollapsed"
    [class.ml-20]="isCollapsed">

    <!-- Top header -->
    <header-theme>
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <h1-theme>Dashboard</h1-theme>
          <div class="h-6 w-px bg-gray-200 dark:bg-gray-700"></div>
          <nav class="hidden md:flex items-center space-x-1">
            <span class="text-sm text-gray-700 dark:text-gray-300">BokiBot</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
            <span class="text-sm font-medium text-gray-900 dark:text-white">Dashboard</span>
          </nav>
        </div>

        <!-- Header actions -->
        <div class="flex items-center space-x-3">
          <!-- Search button -->
          <icon-button-theme>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </icon-button-theme>

          <!-- Notifications -->
          <icon-button-theme [showBadge]="true">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-3.5-3.5a5.5 5.5 0 100-11l3.5 3.5z" />
            </svg>
          </icon-button-theme>

          <!-- Dark Mode Toggle -->
          <icon-button-theme (click)="themeService.toggle()">
            <!-- Sol (modo oscuro activo → clic cambia a claro) -->
            <svg *ngIf="themeService.isDarkMode()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- Luna (modo claro activo → clic cambia a oscuro) -->
            <svg *ngIf="!themeService.isDarkMode()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </icon-button-theme>

          <!-- User Dropdown -->
          <app-user-dropdown></app-user-dropdown>

        </div>
      </div>
    </header-theme>

    <!-- Page content -->
    <main class="flex-1 p-8 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</main-container-theme>
