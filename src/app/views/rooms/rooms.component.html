<div class="space-y-8 p-1">
  <section>
    <button-theme (click)="createRoom()">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M3 21V3h12l6 6v12M9 21v-6h6v6M15 3v6h6" />
      </svg>
      Crear Consultorio
    </button-theme>
  </section>

  <section-theme class="p-2 rounded-2xl">
    <data-grid [columns]="roomColumns" [data]="rooms" [pageSize]="5" [pageSizeOptions]="[5,10,20,50]"
      [title]="'Consultorios'"
      (update)="updateRoom($event)"></data-grid>
  </section-theme>
</div>
