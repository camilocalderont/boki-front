<div class="space-y-8 p-1">
  <section>
    <button-theme (click)="createService()">
      <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
      Crear Servicio
    </button-theme>
  </section>

  <section-theme class="p-2 rounded-2xl">
    <data-grid [columns]="serviceColumns" [data]="services" [pageSize]="5" [pageSizeOptions]="[5,10,20,50]"
      [title]="'Servicios'"
      (update)="updateService($event)"></data-grid>
  </section-theme>
</div>
